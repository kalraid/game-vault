<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Game</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        color: #f8f1df;
        background:
          radial-gradient(circle at top, #20292a, #121616 50%),
          #121616;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      main {
        display: grid;
        gap: 18px;
        min-height: 100vh;
        padding: 28px;
        align-content: start;
        max-width: 1120px;
        margin: 0 auto;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .hero {
        display: grid;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        width: fit-content;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid #3f5648;
        background: #24312a;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .status {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid #44534a;
        border-radius: 12px;
        background: rgba(13, 16, 16, 0.88);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 4px;
      }

      .label {
        font-size: 12px;
        color: #9aa0b4;
      }

      .value {
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 13px;
      }

      .list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid #465d53;
        background: #1b2220;
        font-size: 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        padding: 10px 14px;
        border: 1px solid #d7bc6d;
        border-radius: 8px;
        color: #f8f1df;
        background: #38443c;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.08);
      }

      pre {
        overflow: auto;
        min-height: 240px;
        padding: 16px;
        border: 1px solid #4d544e;
        border-radius: 12px;
        background: #0e1010;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      }

      .muted {
        color: #9aa0b4;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <span class="pill" id="connectionState">starting</span>
        <h1>Mock Game</h1>
        <p class="muted">Temporary portal SDK target for auth, saves, account data, and realtime events.</p>
      </div>

      <section class="status">
        <div class="status-grid">
          <div class="field">
            <span class="label">Auth</span>
            <div class="value" id="authState">not requested yet</div>
          </div>
          <div class="field">
            <span class="label">Save slot 0</span>
            <div class="value" id="saveState">not loaded yet</div>
          </div>
          <div class="field">
            <span class="label">Account data</span>
            <div class="value" id="accountState">not loaded yet</div>
          </div>
          <div class="field">
            <span class="label">Realtime</span>
            <div class="value" id="realtimeState">no events received</div>
          </div>
          <div class="field">
            <span class="label">Subscriptions</span>
            <div class="list" id="subscriptionState">
              <span class="chip">none</span>
            </div>
          </div>
        </div>
      </section>

      <div class="actions">
        <button id="token">auth.getToken</button>
        <button id="store">save.store</button>
        <button id="load">save.load</button>
        <button id="account">account.set/get</button>
        <button id="subscribe">subscribe all</button>
        <button id="event">emit achievement</button>
        <button id="event2">emit progress</button>
        <button id="clear">clear log</button>
      </div>

      <pre id="log">Ready.</pre>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const gameId = params.get("gameId") || "lords-daughter";
      const pending = new Map();
      const log = document.getElementById("log");
      const authState = document.getElementById("authState");
      const saveState = document.getElementById("saveState");
      const accountState = document.getElementById("accountState");
      const realtimeState = document.getElementById("realtimeState");
      const subscriptionState = document.getElementById("subscriptionState");
      const connectionState = document.getElementById("connectionState");
      const subscriptions = new Set();

      function logLine(msg) {
        const line = document.createElement("div");
        line.textContent = msg;
        log.prepend(line);
      }

      function setText(el, value) {
        el.textContent = value;
      }

      function renderSubscriptions() {
        subscriptionState.innerHTML = "";
        if (subscriptions.size === 0) {
          subscriptionState.innerHTML = '<span class="chip">none</span>';
          return;
        }
        for (const name of subscriptions) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = name;
          subscriptionState.appendChild(chip);
        }
      }

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (!message) return;

        if (message.type === "gamevault:sdk-response") {
          const resolve = pending.get(message.requestId);
          if (resolve) {
            pending.delete(message.requestId);
            resolve(message);
          }
          return;
        }

        if (message.type === "gamevault:realtime-event") {
          setText(realtimeState, `${message.event}\n${JSON.stringify(message.payload, null, 2)}`);
          logLine(`realtime event: ${message.event}`);
          subscriptions.add(message.event);
          renderSubscriptions();
        }
      });

      function sdk(method, payload) {
        const requestId = crypto.randomUUID();
        const target = window.opener || window.parent;
        if (!target) {
          return Promise.reject(new Error("No portal window available"));
        }

        target.postMessage(
          { type: "gamevault:sdk-request", requestId, gameId, method, payload },
          "*"
        );

        return new Promise((resolve, reject) => {
          pending.set(requestId, (message) => {
            if (message.ok) resolve(message.result);
            else reject(new Error(message.error || "SDK request failed"));
          });
          setTimeout(() => reject(new Error("SDK request timed out")), 5000);
        });
      }

      async function run(label, fn) {
        try {
          const result = await fn();
          setText(log, `${label}\n\n${JSON.stringify(result, null, 2)}`);
          return result;
        } catch (error) {
          setText(log, `${label} failed\n\n${error.message}`);
          throw error;
        }
      }

      document.getElementById("token").onclick = async () => {
        const result = await run("auth.getToken", () => sdk("auth.getToken"));
        authState.textContent = JSON.stringify(result, null, 2);
      };

      document.getElementById("store").onclick = async () => {
        const result = await run("save.store", () =>
          sdk("save.store", {
            slot: 0,
            schema_version: 1,
            data: {
              gold: Math.floor(Math.random() * 1000),
              saved_at: new Date().toISOString(),
            },
          }),
        );
        saveState.textContent = JSON.stringify(result, null, 2);
      };

      document.getElementById("load").onclick = async () => {
        const result = await run("save.load", () => sdk("save.load", { slot: 0 }));
        saveState.textContent = JSON.stringify(result, null, 2);
      };

      document.getElementById("account").onclick = async () => {
        await sdk("account.set", {
          key: "outer_god_front_club",
          schema_version: 1,
          value: true,
        });
        const result = await run("account.get", () => sdk("account.get"));
        accountState.textContent = JSON.stringify(result, null, 2);
      };

      document.getElementById("subscribe").onclick = async () => {
        const eventNames = ["achievement.unlocked", "progress.updated"];
        for (const eventName of eventNames) {
          const result = await sdk("realtime.subscribe", { event: eventName });
          subscriptions.add(eventName);
          logLine(`subscribed to ${eventName}: ${JSON.stringify(result)}`);
        }
        renderSubscriptions();
      };

      document.getElementById("event").onclick = () =>
        run("realtime.emit", () =>
          sdk("realtime.emit", {
            event: "achievement.unlocked",
            payload: { id: "mock_start" },
          }),
        );

      document.getElementById("event2").onclick = () =>
        run("realtime.emit", () =>
          sdk("realtime.emit", {
            event: "progress.updated",
            payload: { chapter: 1, percent: 42 },
          }),
        );

      document.getElementById("clear").onclick = () => {
        setText(log, "Ready.");
      };

      function boot() {
        const isEmbedded = window.parent !== window;
        connectionState.textContent = isEmbedded
          ? "embedded in portal"
          : "opened as standalone window";

        const code = params.get("c");
        if (code) {
          logLine("new-tab mode: found ?c= code, exchanging");
          sdk("auth.getToken")
            .then((result) => {
              authState.textContent = JSON.stringify(result, null, 2);
            })
            .catch((error) => {
              setText(log, `auth.getToken failed\n\n${error.message}`);
            });
        } else if (isEmbedded) {
          logLine("iframe mode: waiting for portal messages");
        } else {
          logLine("standalone: open this page through the portal");
        }
      }

      boot();
    </script>
  </body>
</html>
